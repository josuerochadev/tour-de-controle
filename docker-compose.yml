services:
  db:
    image: postgres:15
    container_name: tour_de_controle_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - tour_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 5

  sqitch:
    image: sqitch/sqitch
    container_name: tour_de_controle_sqitch
    volumes:
      - ./db:/project
    depends_on:
      db:
        condition: service_healthy
    working_dir: /project
    entrypoint: >
      /bin/bash -c "
      sqitch deploy db:pg://${SQITCH_USER}:${SQITCH_PASSWORD}@db:5432/${SQITCH_DB} &&
      sqitch verify db:pg://${SQITCH_USER}:${SQITCH_PASSWORD}@db:5432/${SQITCH_DB}
      "
    networks:
      - tour_network

  backend:
    build: ./backend
    container_name: tour_de_controle_backend
    restart: always
    environment:
      DB_USER: ${POSTGRES_USER}
      DB_PASS: ${POSTGRES_PASSWORD}
      DB_HOST: db
      DB_NAME: ${POSTGRES_DB}
      DB_PORT: 5432
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: ${NODE_ENV:-production}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:3002}
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - tour_network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:4000/api
    container_name: tour_de_controle_frontend
    restart: always
    ports:
      - "3002:3000"
    depends_on:
      - backend
    networks:
      - tour_network

  redis:
    image: redis:7-alpine
    container_name: tour_de_controle_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - tour_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  db_data:
  redis_data:

networks:
  tour_network:
    driver: bridge
