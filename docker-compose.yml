services:
  db:
    image: postgres:15
    container_name: tour_de_controle_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - tour_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 5

  sqitch:
    image: sqitch/sqitch
    container_name: tour_de_controle_sqitch
    volumes:
      - ./db/migrations:/project
    depends_on:
      db:
        condition: service_healthy
    working_dir: /project
    entrypoint: >
      /bin/bash -c "
      sqitch deploy db:pg://${SQITCH_USER}:${SQITCH_PASSWORD}@db:5432/${SQITCH_DB} &&
      sqitch verify db:pg://${SQITCH_USER}:${SQITCH_PASSWORD}@db:5432/${SQITCH_DB}
      "
    networks:
      - tour_network

  backend:
    build: ./backend
    container_name: tour_de_controle_backend
    restart: always
    environment:
      DB_USER: ${POSTGRES_USER}
      DB_PASS: ${POSTGRES_PASSWORD}
      DB_HOST: db
      DB_NAME: ${POSTGRES_DB}
      DB_PORT: 5432
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: ${NODE_ENV:-production}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:3000}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - tour_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  frontend:
    build: ./frontend
    container_name: tour_de_controle_frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - tour_network

  swagger:
    image: swaggerapi/swagger-ui
    container_name: tour_de_controle_swagger
    ports:
      - "8080:8080"
    environment:
      SWAGGER_JSON: /swagger/swagger.json
    volumes:
      - ./backend/docs/swagger:/swagger
    networks:
      - tour_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: tour_de_controle_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "8081:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - db
    networks:
      - tour_network

  redis:
    image: redis:7-alpine
    container_name: tour_de_controle_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - tour_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  db_data:
  pgadmin_data:
  redis_data:

networks:
  tour_network:
    driver: bridge
