name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — Lint, Type Check & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: tour_de_controle_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_USER: test
      DB_PASS: test
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: tour_de_controle_test
      JWT_SECRET: ci-test-secret-key-32chars-min!!
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx biome check

      - name: Tests with coverage
        run: npm test -- --coverage

      - name: Audit dependencies
        run: npm audit --audit-level=high

  constants-sync:
    name: Verify shared constants are in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check ROLES match between backend and frontend
        run: node scripts/check-constants-sync.js

  frontend:
    name: Frontend — Lint, Type Check & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint .

      - name: Tests with coverage
        run: npm test -- --coverage

      - name: Build
        run: npm run build

      - name: Audit dependencies
        run: npm audit --audit-level=high
