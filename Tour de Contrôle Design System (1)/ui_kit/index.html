<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Tour de Contrôle — V2 Modern</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../tokens.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap">
<style>
  body { font-family: 'Inter', system-ui, sans-serif; font-feature-settings: 'cv11','ss01','ss03'; font-variant-numeric: tabular-nums; margin: 0; }
  @keyframes tdc-pulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.3); } }
  @keyframes tdc-rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  button:focus-visible, input:focus-visible { outline: 2px solid #dc2626; outline-offset: 2px; }
  ::selection { background: #dc2626; color: #fef3e2; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="Pages.jsx"></script>
<script type="text/babel">
function App() {
  const [user, setUser] = React.useState(null);
  const [route, setRoute] = React.useState("dashboard");
  if (!user) return <LoginPage onLogin={setUser} />;
  return (
    <Shell user={user} route={route} setRoute={setRoute} onLogout={() => setUser(null)}>
      <div data-screen-label={`V2 ${route}`}>
        {route === "dashboard" && <VigiePage />}
        {route === "cash-register" && <CaissePage />}
        {route === "transactions" && <FluxPage />}
        {route === "users" && <EquipagePage />}
      </div>
    </Shell>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
