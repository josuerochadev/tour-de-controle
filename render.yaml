databases:
  - name: tour-de-controle-db
    databaseName: tour_de_controle
    user: tdc_admin
    plan: free

services:
  # ── Backend API (Docker) ───────────────────────────────────────────────────
  - type: web
    name: tour-de-controle-api
    env: docker
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tour-de-controle-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      # Set this to your Render frontend URL once the static site is created
      - key: CLIENT_URL
        value: https://tour-de-controle.onrender.com
      # Redis is optional — in-memory fallback is used when not set
      - key: REDIS_URL
        value: ""

  # ── Frontend (Static Site) ─────────────────────────────────────────────────
  - type: web
    name: tour-de-controle
    env: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      # Must match the Render URL of the backend service above
      - key: VITE_API_BASE_URL
        value: https://tour-de-controle-api.onrender.com/api
    routes:
      # SPA fallback: all routes → index.html
      - type: rewrite
        source: /*
        destination: /index.html
